<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WP Recovery SOP • 7-Phase Checklist</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #000;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .d {
            --bg: #0a0a0a;
            --surface: #111111;
            --surface2: #191919;
            --surface3: #222222;
            --border: #2a2a2a;
            --border2: #333333;
            --border3: #444444;
            --text: #f0f0f0;
            --text2: #888888;
            --text3: #555555;
            --red: #ff4444;
            --red-dim: #2a1010;
            --red-mid: #cc3333;
            --amber: #f59e0b;
            --amber-dim: #251a00;
            --amber-mid: #d97706;
            --green: #22c55e;
            --green-dim: #0a1f0f;
            --green-mid: #16a34a;
            --blue: #3b82f6;
            --blue-dim: #0d1a2e;
            --blue-mid: #2563eb;
            --teal: #14b8a6;
            --teal-dim: #041a17;
            --teal-mid: #0d9488;
            --purple: #a78bfa;
            --purple-dim: #160d2e;
            --purple-mid: #7c3aed;
            --gray: #666666;
            --gray-dim: #161616;
            --gray-mid: #444444;

            width: 100%;
            max-width: 980px;
            background: var(--bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }

        /* All your existing styles go here */
        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--red);
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .topbar h1 {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-family: 'JetBrains Mono', monospace;
        }

        .badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--text2);
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 3px 10px;
            border-radius: 20px;
        }

        .prog-wrap {
            padding: 12px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .prog-meta {
            display: flex;
            justify-content: space-between;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--text3);
            margin-bottom: 6px;
        }

        .prog-track {
            height: 3px;
            background: var(--surface3);
            border-radius: 4px;
            overflow: hidden;
        }

        .prog-fill {
            height: 100%;
            border-radius: 4px;
            background: var(--green);
            transition: width 0.4s cubic-bezier(.4, 0, .2, 1);
        }

        .phase-nav {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0;
            border-bottom: 1px solid var(--border);
        }

        .pnav-btn {
            padding: 10px 4px 8px;
            background: transparent;
            border: none;
            border-right: 1px solid var(--border);
            cursor: pointer;
            text-align: center;
            transition: background 0.15s;
            font-family: 'Inter', sans-serif;
            position: relative;
        }

        .pnav-btn:last-child {
            border-right: none;
        }

        .pnav-btn:hover {
            background: var(--surface2);
        }

        .pnav-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: currentColor;
        }

        .pnav-btn .pn {
            font-size: 11px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            line-height: 1;
        }

        .pnav-btn .pl {
            font-size: 8px;
            color: var(--text3);
            margin-top: 4px;
            line-height: 1.2;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .pnav-btn.done .pn {
            opacity: 0.3;
        }

        .pnav-btn.done::before {
            content: '';
            position: absolute;
            top: 8px;
            right: 6px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--green);
        }

        .phase-body {
            padding: 0;
        }

        .phase-hdr {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }

        .phase-icon-wrap {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            border: 1px solid var(--border2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            background: var(--surface2);
        }

        .phase-hdr-text {
            flex: 1;
        }

        .phase-eyebrow {
            font-size: 9px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .phase-ttl {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.4px;
            line-height: 1.2;
        }

        .phase-sub {
            font-size: 11px;
            color: var(--text2);
            margin-top: 3px;
        }

        .timer-pill {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--border2);
            color: var(--text2);
            flex-shrink: 0;
            white-space: nowrap;
            background: var(--surface2);
        }

        .alert {
            margin: 12px 20px 0;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 11px;
            line-height: 1.6;
            border-left: 2px solid;
        }

        .alert-red {
            background: var(--red-dim);
            border-color: var(--red);
            color: #ff8888;
        }

        .alert-amber {
            background: var(--amber-dim);
            border-color: var(--amber);
            color: #fbbf24;
        }

        .tools-row {
            padding: 10px 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .tool-chip {
            font-size: 10px;
            font-family: 'JetBrains Mono', monospace;
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid var(--border2);
            color: var(--text3);
            background: var(--surface2);
        }

        .sec-label {
            font-size: 9px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text3);
            padding: 14px 20px 6px;
        }

        .tasks-list {
            padding: 0 20px 4px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .task {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface2);
            cursor: pointer;
            transition: border-color 0.12s;
            user-select: none;
        }

        .task:hover {
            border-color: var(--border3);
        }

        .task.ck {
            opacity: 0.4;
        }

        .task.ck:hover {
            border-color: var(--border);
        }

        .cb {
            width: 18px;
            height: 18px;
            border-radius: 5px;
            border: 1px solid var(--border3);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.12s;
            margin-top: 1px;
        }

        .task.ck .cb {
            border-color: var(--green);
            background: var(--green);
        }

        .ckm {
            display: none;
            color: #000;
            font-size: 10px;
            font-weight: 700;
            line-height: 1;
        }

        .task.ck .ckm {
            display: block;
        }

        .task-txt {
            font-size: 12px;
            color: var(--text);
            line-height: 1.5;
            flex: 1;
        }

        .task.ck .task-txt {
            text-decoration: line-through;
            color: var(--text3);
        }

        .tag {
            font-size: 9px;
            font-family: 'JetBrains Mono', monospace;
            padding: 2px 6px;
            border-radius: 3px;
            flex-shrink: 0;
            margin-top: 2px;
            font-weight: 600;
        }

        .footer {
            padding: 12px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            background: var(--surface);
            margin-top: 12px;
        }

        .fp-text {
            font-size: 10px;
            color: var(--text3);
            font-family: 'JetBrains Mono', monospace;
        }

        .nav-btns {
            display: flex;
            gap: 8px;
        }

        .nbtn {
            padding: 7px 16px;
            border-radius: 7px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border2);
            background: var(--surface2);
            color: var(--text2);
            font-family: 'Inter', sans-serif;
            transition: all 0.12s;
            letter-spacing: 0.02em;
        }

        .nbtn:hover {
            border-color: var(--border3);
            color: var(--text);
        }

        .nbtn.pri {
            border-color: var(--green);
            color: var(--green);
            background: var(--green-dim);
        }

        .nbtn.pri:hover {
            background: var(--surface2);
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
        }
    </style>
</head>
<body>

        <div class="phase-nav" id="pnav"></div>

</body>
</html>
