
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:black;
}
.d{
  --bg:#0a0a0a;--surface:#111111;--surface2:#191919;--surface3:#222222;
  --border:#2a2a2a;--border2:#333333;--border3:#444444;
  --text:#f0f0f0;--text2:#888888;--text3:#555555;
  --red:#ff4444;--red-dim:#2a1010;--red-mid:#cc3333;
  --amber:#f59e0b;--amber-dim:#251a00;--amber-mid:#d97706;
  --green:#22c55e;--green-dim:#0a1f0f;--green-mid:#16a34a;
  --blue:#3b82f6;--blue-dim:#0d1a2e;--blue-mid:#2563eb;
  --teal:#14b8a6;--teal-dim:#041a17;--teal-mid:#0d9488;
  --purple:#a78bfa;--purple-dim:#160d2e;--purple-mid:#7c3aed;
  --gray:#666666;--gray-dim:#161616;--gray-mid:#444444;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  border-radius:16px;
  padding:0;
  margin: 0;
  overflow:hidden;
}
.topbar{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
}
.topbar-left{display:flex;align-items:center;gap:10px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.topbar h1{font-size:13px;font-weight:600;color:var(--text);letter-spacing:0.5px;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
.badge{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);padding:3px 10px;border-radius:20px}

.prog-wrap{padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border)}
.prog-meta{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);margin-bottom:6px}
.prog-track{height:3px;background:var(--surface3);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;background:var(--green);transition:width 0.4s cubic-bezier(.4,0,.2,1)}

.phase-nav{display:grid;grid-template-columns:repeat(7,1fr);gap:0;border-bottom:1px solid var(--border)}
.pnav-btn{
  padding:10px 4px 8px;background:transparent;border:none;border-right:1px solid var(--border);
  cursor:pointer;text-align:center;transition:background 0.15s;font-family:'Inter',sans-serif;
  position:relative;
}
.pnav-btn:last-child{border-right:none}
.pnav-btn:hover{background:var(--surface2)}
.pnav-btn.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:currentColor}
.pnav-btn .pn{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1}
.pnav-btn .pl{font-size:8px;color:var(--text3);margin-top:4px;line-height:1.2;text-transform:uppercase;letter-spacing:0.04em}
.pnav-btn.done .pn{opacity:0.3}
.pnav-btn.done::before{content:'';position:absolute;top:8px;right:6px;width:5px;height:5px;border-radius:50%;background:var(--green)}

.phase-body{padding:0}
.phase-hdr{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;gap:14px;
}
.phase-icon-wrap{
  width:44px;height:44px;border-radius:10px;border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
  background:var(--surface2);
}
.phase-hdr-text{flex:1}
.phase-eyebrow{font-size:9px;font-family:'JetBrains Mono',monospace;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px}
.phase-ttl{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-0.4px;line-height:1.2}
.phase-sub{font-size:11px;color:var(--text2);margin-top:3px}
.timer-pill{font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 10px;border-radius:20px;border:1px solid var(--border2);color:var(--text2);flex-shrink:0;white-space:nowrap;background:var(--surface2)}

.alert{margin:12px 20px 0;padding:10px 14px;border-radius:8px;font-size:11px;line-height:1.6;border-left:2px solid}
.alert-red{background:var(--red-dim);border-color:var(--red);color:#ff8888}
.alert-amber{background:var(--amber-dim);border-color:var(--amber);color:#fbbf24}

.tools-row{padding:10px 20px 0;display:flex;flex-wrap:wrap;gap:5px}
.tool-chip{font-size:10px;font-family:'JetBrains Mono',monospace;padding:3px 8px;border-radius:4px;border:1px solid var(--border2);color:var(--text3);background:var(--surface2)}

.sec-label{font-size:9px;font-family:'JetBrains Mono',monospace;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);padding:14px 20px 6px}

.tasks-list{padding:0 20px 4px;display:flex;flex-direction:column;gap:6px}
.task{
  display:flex;align-items:flex-start;gap:10px;padding:10px 12px;
  border-radius:8px;border:1px solid var(--border);background:var(--surface2);
  cursor:pointer;transition:border-color 0.12s;user-select:none;
}
.task:hover{border-color:var(--border3)}
.task.ck{opacity:0.4}
.task.ck:hover{border-color:var(--border)}
.cb{
  width:18px;height:18px;border-radius:5px;border:1px solid var(--border3);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.12s;margin-top:1px;
}
.task.ck .cb{border-color:var(--green);background:var(--green)}
.ckm{display:none;color:#000;font-size:10px;font-weight:700;line-height:1}
.task.ck .ckm{display:block}
.task-txt{font-size:12px;color:var(--text);line-height:1.5;flex:1}
.task.ck .task-txt{text-decoration:line-through;color:var(--text3)}
.tag{font-size:9px;font-family:'JetBrains Mono',monospace;padding:2px 6px;border-radius:3px;flex-shrink:0;margin-top:2px;font-weight:600}

.footer{
  padding:12px 20px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
  background:var(--surface);margin-top:12px;
}
.fp-text{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.nav-btns{display:flex;gap:8px}
.nbtn{
  padding:7px 16px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;
  border:1px solid var(--border2);background:var(--surface2);color:var(--text2);
  font-family:'Inter',sans-serif;transition:all 0.12s;letter-spacing:0.02em;
}
.nbtn:hover{border-color:var(--border3);color:var(--text)}
.nbtn.pri{border-color:var(--green);color:var(--green);background:var(--green-dim)}
.nbtn.pri:hover{background:var(--surface2)}
</style>

<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden">WordPress hack recovery SOP dashboard — 7-phase interactive checklist</h2>

<div class="d" id="app">
<div class="topbar">
  <div class="topbar-left">
    <div class="logo-dot"></div>
    <h1>WP Recovery — SOP</h1>
  </div>
  <span class="badge" id="ovr-status">0 / 7 phases done</span>
</div>

<div class="prog-wrap">
  <div class="prog-meta"><span>overall progress</span><span id="ovr-pct">0%</span></div>
  <div class="prog-track"><div class="prog-fill" id="ovr-fill" style="width:0%"></div></div>
</div>

<div class="phase-nav" id="pnav"></div>
<div id="pcontent"></div>
</div>

<script>
const PH=[
  {t:"Immediate Containment",s:"Stop the bleeding — first 60 min",tm:"0–60 min",ic:"🔒",c:"red",
   al:{tp:"red",tx:"Do NOT delete anything yet — you need the hacked files for evidence. Lock access first."},
   tl:["WP Maintenance Mode","UpdraftPlus","cPanel","FileZilla"],
   tasks:[
    {x:"Put site into maintenance mode immediately",tg:"critical"},
    {x:"Full backup — files + database (even if hacked, for evidence)",tg:"critical"},
    {x:"Change WordPress admin password",tg:"critical"},
    {x:"Change hosting / cPanel password",tg:"security"},
    {x:"Change FTP / SFTP credentials",tg:"security"},
    {x:"Change database user password",tg:"security"},
    {x:"Check connected email accounts, change passwords",tg:"security"},
    {x:"Notify client — ask about any recent changes they made",tg:"comms"},
  ]},
  {t:"Investigation & Assessment",s:"Understand exactly what happened",tm:"30–90 min",ic:"🔍",c:"amber",
   al:{tp:"amber",tx:"Screenshot everything. This protects you legally if the client disputes the damage."},
   tl:["Wordfence","Sucuri","MalCare","Google Search Console","Server Logs"],
   tasks:[
    {x:"Run full malware scan with Wordfence or Sucuri",tg:"scan"},
    {x:"Check server access logs for suspicious IPs / requests",tg:"logs"},
    {x:"Review .htaccess for injected redirects or malicious rules",tg:"files"},
    {x:"Look for unauthorized admin users in WordPress",tg:"users"},
    {x:"Check Google Search Console for security warnings",tg:"seo"},
    {x:"Inspect wp-content/uploads for PHP files (huge red flag)",tg:"files"},
    {x:"Review plugin list for unknown or nulled plugins",tg:"audit"},
    {x:"Screenshot and document ALL findings",tg:"docs"},
  ]},
  {t:"Cleanup",s:"Remove malware, restore clean files",tm:"1–4 hrs",ic:"🧹",c:"purple",
   al:{tp:"amber",tx:"Have a clean backup? Use it — fastest and safest path. Skip straight to step 1."},
   tl:["wordpress.org","phpMyAdmin","Better Search Replace","Wordfence Cleaner"],
   tasks:[
    {x:"Restore from a clean backup if available (preferred)",tg:"restore"},
    {x:"If no backup: download fresh WP core from wordpress.org",tg:"core"},
    {x:"Replace all core files except wp-content and wp-config.php",tg:"core"},
    {x:"Delete and reinstall all plugins from official repos",tg:"plugins"},
    {x:"Delete and reinstall theme (never use nulled themes)",tg:"theme"},
    {x:"Clean database — remove suspicious users, injected content",tg:"db"},
    {x:"Remove all PHP files from /wp-content/uploads/",tg:"uploads"},
    {x:"Clean wp-config.php — check for injected code at top/bottom",tg:"config"},
    {x:"Restore .htaccess to default WordPress version",tg:"config"},
    {x:"Run another full scan and confirm clean",tg:"verify"},
  ]},
  {t:"Hardening & Securing",s:"Close every door they used",tm:"1–2 hrs",ic:"🛡️",c:"blue",
   tl:["Wordfence","WP 2FA","iThemes Security","Cloudflare","WP Cerber"],
   tasks:[
    {x:"Update WordPress core to latest version",tg:"update"},
    {x:"Update ALL plugins to latest versions",tg:"update"},
    {x:"Update all themes to latest versions",tg:"update"},
    {x:"Install and configure Wordfence or Sucuri WAF",tg:"security"},
    {x:"Enable 2FA for all admin accounts",tg:"auth"},
    {x:"Remove or rename the 'admin' username",tg:"auth"},
    {x:"Limit login attempts (Wordfence or Loginizer)",tg:"auth"},
    {x:"Disable XML-RPC if not needed",tg:"hardening"},
    {x:"Set file permissions — 644 files / 755 folders",tg:"server"},
    {x:"Delete unused plugins and themes completely",tg:"cleanup"},
    {x:"Verify SSL/HTTPS is active and configured",tg:"ssl"},
    {x:"Block direct access to wp-includes and sensitive dirs",tg:"server"},
  ]},
  {t:"Testing & Verification",s:"Confirm everything works and is clean",tm:"30–60 min",ic:"✅",c:"teal",
   tasks:[
    {x:"Test full frontend — all pages, images, menus, links",tg:"frontend"},
    {x:"Test forms, WooCommerce checkout, critical functions",tg:"functional"},
    {x:"Test WordPress admin — all sections accessible",tg:"backend"},
    {x:"Test login / logout flow",tg:"auth"},
    {x:"Check on mobile + at least 2 different browsers",tg:"compat"},
    {x:"Verify no security warnings in Google Search Console",tg:"seo"},
    {x:"Request GSC security review if manual action was issued",tg:"seo"},
    {x:"Check site speed — malware adds hidden scripts",tg:"perf"},
  ]},
  {t:"Go Live + Documentation",s:"Hand off cleanly and professionally",tm:"30 min",ic:"🚀",c:"green",
   tl:["Google Docs","Notion","PDF Export"],
   tasks:[
    {x:"Take the site out of maintenance mode",tg:"launch"},
    {x:"Do one final check of the live site",tg:"verify"},
    {x:"Set up automatic backups (UpdraftPlus → cloud)",tg:"backup"},
    {x:"Set up uptime monitoring (UptimeRobot — free)",tg:"monitor"},
    {x:"Write client report: what was hacked, fixed, future protection",tg:"report"},
    {x:"Send client the report + recommendations",tg:"comms"},
  ]},
  {t:"Ongoing Maintenance",s:"Keep it from happening again",tm:"Monthly",ic:"🔄",c:"gray",
   al:{tp:"amber",tx:"Pitch this as a monthly retainer. This is recurring revenue for you — don't skip it."},
   tasks:[
    {x:"Run monthly full malware scan",tg:"scan"},
    {x:"Update all plugins, themes, and core",tg:"update"},
    {x:"Review user accounts — remove unknown users",tg:"audit"},
    {x:"Check backup logs — confirm backups running",tg:"backup"},
    {x:"Review Wordfence logs for suspicious activity",tg:"logs"},
    {x:"Check site performance and uptime reports",tg:"monitor"},
    {x:"Send client a short monthly report email",tg:"comms"},
  ]},
];

const CM={
  red:   {ac:'#ff4444',dim:'#2a1010',txt:'#ff8888',ey:'#ff4444'},
  amber: {ac:'#f59e0b',dim:'#251a00',txt:'#fbbf24',ey:'#f59e0b'},
  purple:{ac:'#a78bfa',dim:'#160d2e',txt:'#c4b5fd',ey:'#a78bfa'},
  blue:  {ac:'#3b82f6',dim:'#0d1a2e',txt:'#93c5fd',ey:'#3b82f6'},
  teal:  {ac:'#14b8a6',dim:'#041a17',txt:'#5eead4',ey:'#14b8a6'},
  green: {ac:'#22c55e',dim:'#0a1f0f',txt:'#86efac',ey:'#22c55e'},
  gray:  {ac:'#888888',dim:'#161616',txt:'#aaaaaa',ey:'#888888'},
};

const TG={
  critical:'red',security:'blue',comms:'purple',scan:'teal',logs:'gray',
  files:'amber',users:'purple',seo:'blue',audit:'amber',docs:'gray',
  restore:'green',core:'purple',plugins:'blue',theme:'teal',db:'red',
  uploads:'amber',config:'purple',verify:'green',update:'teal',auth:'red',
  hardening:'blue',server:'gray',cleanup:'teal',ssl:'green',frontend:'teal',
  functional:'blue',backend:'purple',backup:'green',monitor:'teal',report:'gray',
  launch:'green',perf:'amber',compat:'gray',
};

const TG_STYLE={
  red:   'background:#2a1010;color:#ff6666;border:1px solid #3a1515',
  amber: 'background:#251a00;color:#f59e0b;border:1px solid #3a2800',
  purple:'background:#160d2e;color:#a78bfa;border:1px solid #241545',
  blue:  'background:#0d1a2e;color:#3b82f6;border:1px solid #142040',
  teal:  'background:#041a17;color:#14b8a6;border:1px solid #072825',
  green: 'background:#0a1f0f;color:#22c55e;border:1px solid #102815',
  gray:  'background:#161616;color:#888888;border:1px solid #2a2a2a',
};

let cur=0;
let ck=PH.map(p=>new Array(p.tasks.length).fill(false));

function phProg(i){const t=PH[i].tasks.length,c=ck[i].filter(Boolean).length;return{d:c,t,p:t?Math.round(c/t*100):0}}
function ovrProg(){let d=0,t=0;PH.forEach((_,i)=>{const p=phProg(i);d+=p.d;t+=p.t});return{d,t,p:t?Math.round(d/t*100):0}}
function phDone(i){return ck[i].every(Boolean)}

function renderNav(){
  document.getElementById('pnav').innerHTML=PH.map((p,i)=>{
    const col=CM[p.c],active=i===cur,done=phDone(i);
    const aStyle=active?`color:${col.ac};border-bottom:2px solid ${col.ac}`:'';
    return `<button class="pnav-btn${active?' active':''}${done?' done':''}" style="${aStyle}" onclick="go(${i})">
      <div class="pn" style="${active?'color:'+col.ac:done?'color:#333':'color:#666'}">${done?'✓':('0'+(i+1)).slice(-2)}</div>
      <div class="pl">${p.t.split(' ')[0]}</div>
    </button>`;
  }).join('');
}

function renderPhase(){
  const p=PH[cur],col=CM[p.c],prog=phProg(cur);
  let h=`<div class="phase-body">
  <div class="phase-hdr" style="border-left:3px solid ${col.ac}">
    <div class="phase-icon-wrap" style="border-color:${col.ac}22">${p.ic}</div>
    <div class="phase-hdr-text">
      <div class="phase-eyebrow" style="color:${col.ac}">Phase ${cur+1} of 7</div>
      <div class="phase-ttl">${p.t}</div>
      <div class="phase-sub">${p.s}</div>
    </div>
    <div class="timer-pill">${p.tm}</div>
  </div>`;

  if(p.al) h+=`<div class="alert alert-${p.al.tp}" style="margin-top:12px">${p.al.tx}</div>`;
  if(p.tl&&p.tl.length) h+=`<div class="tools-row">${p.tl.map(t=>`<span class="tool-chip">${t}</span>`).join('')}</div>`;

  h+=`<div class="sec-label">checklist — ${prog.d}/${prog.t} done</div><div class="tasks-list">`;
  p.tasks.forEach((task,ti)=>{
    const c=ck[cur][ti],tgc=TG[task.tg]||'gray',ts=TG_STYLE[tgc]||TG_STYLE.gray;
    h+=`<div class="task${c?' ck':''}" onclick="tog(${cur},${ti})">
      <div class="cb"><span class="ckm">✓</span></div>
      <div class="task-txt">${task.x}</div>
      <span class="tag" style="${ts}">${task.tg}</span>
    </div>`;
  });

  h+=`</div><div class="footer">
    <div class="fp-text">${prog.p}% this phase</div>
    <div class="nav-btns">
      ${cur>0?`<button class="nbtn" onclick="go(${cur-1})">← prev</button>`:''}
      ${cur<PH.length-1
        ?`<button class="nbtn${phDone(cur)?' pri':''}" onclick="go(${cur+1})">${phDone(cur)?'done → next':'next →'}</button>`
        :`<button class="nbtn pri" onclick="fin()">generate report ↗</button>`}
    </div>
  </div></div>`;

  document.getElementById('pcontent').innerHTML=h;
}

function renderOvr(){
  const op=ovrProg();
  const dc=PH.filter((_,i)=>phDone(i)).length;
  document.getElementById('ovr-fill').style.width=op.p+'%';
  document.getElementById('ovr-pct').textContent=op.p+'%';
  document.getElementById('ovr-status').textContent=dc+' / 7 phases done';
}

function tog(pi,ti){ck[pi][ti]=!ck[pi][ti];renderNav();renderPhase();renderOvr()}
function go(i){cur=i;renderNav();renderPhase()}
function fin(){if(typeof sendPrompt==='function')sendPrompt('All 7 phases complete. Help me write a professional client report for this WordPress hack recovery.')}

renderNav();renderPhase();renderOvr();
</script>
